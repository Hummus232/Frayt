// ---------- Animated number ----------
function AnimNum({ value, className, decimals=2 }) {
  const [v, setV] = useState(value);
  useEffect(() => {
    const start = v, delta = value - start, dur = 600, t0 = performance.now();
    let raf; const tick = (t) => { const p = Math.min(1, (t-t0)/dur); const e = 1-Math.pow(1-p,3); setV(start + delta*e); if (p<1) raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <span className={className}>{v.toFixed(decimals)}</span>;
}

}

// ---------- Mock QR ----------
const MockQR = ({size=200, onClick}) => {
  const cells = useMemo(() => {
    const g=21, arr=[]; let s=123;
    for (let y=0;y<g;y++) for (let x=0;x<g;x++){ s=(s*9301+49297)%233280; arr.push({x,y,on:(s/233280)>0.5}); }
    const mark=(ox,oy)=>{ for(let y=0;y<7;y++) for(let x=0;x<7;x++){ const i=(oy+y)*g+(ox+x); if(i<arr.length){ const edge=x===0||y===0||x===6||y===6; const center=x>=2&&x<=4&&y>=2&&y<=4; arr[i].on=edge||center; } } };
    mark(0,0); mark(14,0); mark(0,14); return arr;
  }, []);
  return (
    <svg onClick={onClick} viewBox="0 0 21 21" width={size} height={size} className={onClick?"cursor-pointer":""}>
      <rect width="21" height="21" fill="white"/>
      {cells.map((c,i)=>c.on && <rect key={i} x={c.x} y={c.y} width="1" height="1" fill="#0F766E"/>)}
    </svg>
  );
};

// ---------- API client ----------
// Allow override via URL hash (?api=https://...) or window.FRAYT_CONFIG; fallback to localhost for dev
const API_BASE = (window.FRAYT_CONFIG && window.FRAYT_CONFIG.apiBase) || 'http://localhost:3001/api';
const MERCHANT_KEY = (window.FRAYT_CONFIG && window.FRAYT_CONFIG.merchantKey) || 'demo-merchant-key';
const DEMO_PHONE = '+962791114821';

async function apiCall(path, { method='GET', body, token, merchantKey } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers.Authorization = 'Bearer ' + token;
  if (merchantKey) headers['x-merchant-key'] = merchantKey;
  const res = await fetch(API_BASE + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

  wallet: (token) => apiCall('/wallet', { token }),
  merchantQr: (amount, paid) => apiCall('/merchant/qr', { method:'POST', body:{amount, paid}, merchantKey: MERCHANT_KEY }),
  merchantToday: () => apiCall('/merchant/today', { merchantKey: MERCHANT_KEY }),
  scan: (qrId, token) => apiCall('/scan', { method:'POST', body:{qrId}, token }),
  redeem: (rewardId, token) => apiCall('/redeem', { method:'POST', body:{rewardId}, token }),
  billers: () => apiCall('/billers'),

    }).catch(err => console.warn('wallet load failed', err.message));

  // Refresh merchant today from API when view changes to merchant or demo
  useEffect(() => {
    if (!apiOnline) return;
    if (view !== 'merchant' && view !== 'demo') return;
    api.merchantToday().then(d => { setMCount(d.count); setMTotal(d.total); }).catch(()=>{});
  }, [view, apiOnline]);

  const net = { apiOnline, token, setToken, qrId, setQrId, qrDataUrl, setQrDataUrl };

  const receiveChange = (amt) => {
    const half = +(amt/2).toFixed(2);
    setBalance(b => +(b+half).toFixed(2));
    setSavings(s => +(s+half).toFixed(2));
    setPoints(p => p + Math.round(amt*100));
    setToday(tdy => +(tdy+amt).toFixed(2));
    setLastReceive(amt);
    setTx(arr => [{ type:'in', name:'tx_coffee', amt, time:'tx_just' }, ...arr]);
    setConfetti(true); setTimeout(()=>setConfetti(false), 2000);
  };

  const redeem = async (cost, name, rewardKey) => {
    if (points < cost) return;
    if (apiOnline && token) {
      try {
        const r = await api.redeem(rewardKey, token);
        setPoints(r.wallet.points);
        setTx(arr => [{ type:'rewards', name, amt:-cost, time:'tx_just' }, ...arr]);
        setRedeemOpen(false);
        return;
      } catch (e) { console.warn('redeem api failed, local fallback', e.message); }
    }
    setPoints(p => p - cost);
    setTx(arr => [{ type:'rewards', name, amt:-cost, time:'tx_just' }, ...arr]);
    setRedeemOpen(false);
  };

  const resetToWelcome = () => { setScreen('welcome'); setTab('home'); setOtp(['','','','']); };

  return (
    <div className="min-h-screen flex flex-col items-stretch sm:items-center sm:py-6 sm:px-4 sm:gap-4" dir={rtl?'rtl':'ltr'}>
      <div className="sticky top-0 z-40 w-full sm:w-auto bg-slate-100/90 backdrop-blur sm:bg-transparent sm:backdrop-blur-0 py-2 sm:py-0 flex flex-col items-center gap-2 border-b border-slate-200 sm:border-0">
      <div className={`flex items-center gap-1.5 text-[11px] font-semibold px-3 py-1 rounded-full ${apiOnline===true?'bg-emerald-50 text-emerald-700':apiOnline===false?'bg-amber-50 text-amber-700':'bg-slate-100 text-slate-500'}`}>
        <span className={`w-1.5 h-1.5 rounded-full ${apiOnline===true?'bg-emerald-500 animate-pulse':apiOnline===false?'bg-amber-500':'bg-slate-400'}`}></span>
        {apiOnline===true?'API Connected':apiOnline===false?'API Offline (local mode)':'Checking API…'}
      </div>
      <div className="flex gap-2 items-center bg-white rounded-full shadow-md p-1.5">
        <button onClick={()=>setLang(lang==='en'?'ar':'en')} className="px-4 py-1.5 rounded-full text-sm font-semibold bg-slate-100 hover:bg-slate-200">
          {lang==='en' ? 'العربية' : 'English'}
        </button>
        <div className="flex bg-slate-100 rounded-full p-1 text-xs font-semibold">
          <button onClick={()=>setView('customer')} className={`px-3 py-1 rounded-full ${view==='customer'?'bg-teal-600 text-white':'text-slate-600'}`}>{t.customer_view}</button>
          <button onClick={()=>setView('merchant')} className={`px-3 py-1 rounded-full ${view==='merchant'?'bg-teal-600 text-white':'text-slate-600'}`}>{t.merchant_view}</button>
          <button onClick={()=>setView('demo')} className={`px-3 py-1 rounded-full ${view==='demo'?'bg-teal-600 text-white':'text-slate-600'}`}>{t.demo_view}</button>
        </div>
      </div>
      </div>{/* /sticky controls */}

      {view === 'demo' ? (
        <div className="flex flex-row flex-wrap justify-center items-start gap-6 max-w-full">
          <div className="flex flex-col items-center gap-2">
            <div className="phone">
              <div className="notch"></div>
              <CustomerRoot {...{t, rtl, screen, setScreen, tab, setTab, balance, savings, goal, points, today, lastReceive, tx, otp, setOtp, receiveChange, redeemOpen, setRedeemOpen, redeem, filter, setFilter, confetti, resetToWelcome, lang, setLang, pendingChange, setPendingChange, demoMode:true, setMScreen, setMCount, setMTotal, setBalance, setSavings, setPoints, setToday, setTx, setLastReceive, setConfetti, ...net}}/>
              {confetti && screen==='success' && <Confetti/>}
            </div>
            <p className="text-xs font-semibold text-slate-500">📱 {t.demo_label_c}</p>
          </div>
          <div className="flex flex-col items-center gap-2">
            <div className="phone">
              <div className="notch"></div>
              <MerchantFlow {...{t, rtl, mScreen, setMScreen, amount, setAmount, paid, setPaid, change, mCount, setMCount, mTotal, setMTotal, demoMode:true, setPendingChange, ...net}}/>
            </div>

          </div>
        </div>
      ) : (
        <div className="phone">
          <div className="notch"></div>
          {view === 'customer' ? (
            <CustomerRoot {...{t, rtl, screen, setScreen, tab, setTab, balance, savings, goal, points, today, lastReceive, tx, otp, setOtp, receiveChange, redeemOpen, setRedeemOpen, redeem, filter, setFilter, confetti, resetToWelcome, lang, setLang, pendingChange, setPendingChange, demoMode:false, setBalance, setSavings, setPoints, setToday, setTx, setLastReceive, setConfetti, ...net}}/>
          ) : (
            <MerchantFlow {...{t, rtl, mScreen, setMScreen, amount, setAmount, paid, setPaid, change, mCount, setMCount, mTotal, setMTotal, demoMode:false, setPendingChange, ...net}}/>
          )}
          {confetti && view==='customer' && screen==='success' && <Confetti/>}
        </div>
      )}

      <p className="hidden sm:block text-xs text-slate-500 mt-2">{rtl?'فراطة':'Frayt'}</p>
    </div>
  );

// ---------- Customer Root (flows + tabs) ----------
function CustomerRoot(p) {
  const { screen } = p;
  return (
    <div className="w-full h-full bg-slate-50 relative overflow-hidden">
      {screen === 'welcome' && <Welcome t={p.t} onNext={()=>p.setScreen('otp')} />}
      {screen === 'otp' && <Otp {...p} onNext={async () => {
        if (p.apiOnline) {
          try {
            await api.requestOtp(DEMO_PHONE);
            const r = await api.verifyOtp(DEMO_PHONE, '1234');
            p.setToken(r.token);
          } catch (e) { console.warn('auth failed', e.message); }
        }
        p.setScreen('app');
      }} />}
      {screen === 'app' && <AppTabs {...p} />}
      {screen === 'pay' && <PayFlow {...p} />}
      {screen === 'scan' && <Scan t={p.t} qrDataUrl={p.qrDataUrl} onScan={async ()=>{
        const amt = p.pendingChange ?? 0.35;
        // Try real API scan if we have a live qrId + token
        if (p.apiOnline && p.token && p.qrId) {
          try {
            const r = await api.scan(p.qrId, p.token);
            p.setBalance(r.wallet.balance);
            p.setSavings(r.wallet.savings);
            p.setPoints(r.wallet.points);
            p.setToday(tdy => +(tdy + r.received).toFixed(2));
            p.setLastReceive ? p.setLastReceive(r.received) : null;
            p.setTx(arr => [{ type:'in', name:'Cafe Solo', amt:r.received, time:'tx_just' }, ...arr]);
            p.setConfetti && p.setConfetti(true);
            setTimeout(()=>p.setConfetti && p.setConfetti(false), 2000);
            if (p.demoMode) {
              p.setMScreen('done');
              p.setMCount(c=>c+1);
              p.setMTotal(v=>+(v+r.received).toFixed(2));
              p.setPendingChange(null);
            }
            p.setQrId(null); p.setQrDataUrl(null);
            p.setScreen('success');
            return;
          } catch (e) { console.warn('scan api failed, local fallback', e.message); }
        }
        // Local fallback
        p.receiveChange(amt);
        if (p.demoMode && p.pendingChange != null) {
          p.setMScreen('done');
          p.setMCount(c=>c+1);
          p.setMTotal(v=>+(v+amt).toFixed(2));
          p.setPendingChange(null);
        }
        p.setScreen('success');
      }} onBack={()=>p.setScreen('app')} />}
      {screen === 'success' && <Success t={p.t} amount={p.lastReceive} onDone={()=>p.setScreen('app')} />}
    </div>
  );
}

// ---------- OTP ----------
function Otp({t, rtl, otp, setOtp, onNext, resetToWelcome}) {
  const refs = [useRef(),useRef(),useRef(),useRef()];
  const set = (i,v) => {
    if (!/^\d?$/.test(v)) return;
    const n = [...otp]; n[i]=v; setOtp(n);
    if (v && i<3) refs[i+1].current?.focus();
    if (n.every(x=>x)) setTimeout(onNext, 400);
  };
  return (
    <div className="h-full flex flex-col p-6 pt-12 fade-in">
      <button onClick={resetToWelcome} className="text-slate-400 text-sm mb-8 self-start">{rtl?'→ رجوع':'← Back'}</button>

      <p className="text-slate-500 text-sm mb-10">{t.otp_sub}</p>
      <div className="flex gap-3 justify-center mb-6" dir="ltr">
        {otp.map((v,i)=>(
          <input key={i} ref={refs[i]} value={v} onChange={e=>set(i,e.target.value)} maxLength={1} inputMode="numeric"
            className="w-14 h-16 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-teal-600 outline-none"/>
        ))}
      </div>
      <button className="text-teal-600 text-sm font-semibold">{t.resend}</button>
      <div className="flex-1"></div>
      <button onClick={onNext} disabled={!otp.every(x=>x)} className="w-full bg-teal-600 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-4 rounded-2xl">
        {t.continue}
      </button>
    </div>
  );
}

  );
}

// ---------- Pay Flow (bill pay via eFAWATEERcom-style) ----------
const CATS = [
  {id:'electricity', icon:'⚡', color:'amber'},
  {id:'water', icon:'💧', color:'sky'},
  {id:'mobile', icon:'📱', color:'violet'},
  {id:'internet', icon:'🌐', color:'teal'},
  {id:'education', icon:'🎓', color:'rose'},
  {id:'government', icon:'🏛️', color:'slate'},
];

// Due-date helper: computes days diff from today
function dueMeta(dueDateStr, t) {
  if (!dueDateStr) return null;
  const due = new Date(dueDateStr + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const days = Math.floor((due - now) / 86400000);
  if (days < 0) return { tone:'red', label:t.pay_due_overdue, bg:'bg-red-100 text-red-700' };
  if (days === 0) return { tone:'red', label:t.pay_due_today, bg:'bg-red-100 text-red-700' };
  if (days <= 3) return { tone:'amber', label:`${t.pay_due_soon} · ${days} ${t.pay_days_left}`, bg:'bg-amber-100 text-amber-800' };
  return { tone:'green', label:`${days} ${t.pay_days_left}`, bg:'bg-emerald-50 text-emerald-700' };
}

function PayFlow({t, rtl, lang, balance, setBalance, setTx, setScreen, apiOnline, token}) {
  const [step, setStep] = useState('categories');
  const [billers, setBillers] = useState([]);
  const [saved, setSaved] = useState([]);
  const [recent, setRecent] = useState([]);
  const [category, setCategory] = useState(null);
  const [biller, setBiller] = useState(null);
  const [reference, setReference] = useState('');
  const [bill, setBill] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState('');
  const [nickname, setNickname] = useState('');
  const [savedOk, setSavedOk] = useState(false);
  const refInput = useRef(null);

  const nameKey = lang === 'ar' ? 'name_ar' : 'name_en';
  const labelKey = lang === 'ar' ? 'ref_label_ar' : 'ref_label_en';

  // Load billers + saved + recent on mount
  useEffect(() => {
    if (!apiOnline) {
      setBillers([
        {id:1, category:'electricity', name_en:'JEPCO', name_ar:'شركة الكهرباء', icon:'⚡', ref_label_en:'Meter number', ref_label_ar:'رقم العداد'},
        {id:5, category:'mobile', name_en:'Zain', name_ar:'زين', icon:'📱', ref_label_en:'Mobile number', ref_label_ar:'رقم الهاتف'},
        {id:3, category:'water', name_en:'Miyahuna', name_ar:'مياهنا', icon:'💧', ref_label_en:'Subscription', ref_label_ar:'رقم الاشتراك'},
      ]);
      return;
    }
    api.billers().then(d => setBillers(d.billers || [])).catch(()=>{});
    if (token) {
      api.savedBillers(token).then(d => setSaved(d.saved || [])).catch(()=>{});
      api.recentBills(token).then(d => setRecent(d.recent || [])).catch(()=>{});
    }
  }, [apiOnline, token]);

  // Auto-focus reference input on step change
  useEffect(() => { if (step === 'reference') setTimeout(() => refInput.current?.focus(), 60); }, [step]);

  const catBillers = billers.filter(b => b.category === category && (!search.trim() || b[nameKey].toLowerCase().includes(search.toLowerCase())));

  const lookupBill = async (billerArg, refArg) => {
    const b = billerArg || biller;
    const r = (refArg ?? reference).trim();
    if (!r || !b) return;
    setLoading(true); setError(null);
    if (apiOnline && token) {
      try {
        const res = await api.billLookup(b.id, r, token);
        setBill(res);
        setBiller(b); setReference(r);
        setStep('confirm');
      } catch (e) { setError(e.message); }
    } else {
      const hash = [...r].reduce((a,c)=>a+c.charCodeAt(0), 0);
      const base = { electricity:28, water:12, mobile:8, internet:22, education:320, government:45 }[b.category] || 20;
      const amount = +((base + (hash%30) - 5 + (hash%100)/100).toFixed(2));
      const dueDate = new Date(Date.now() + (7+(hash%20))*86400000).toISOString().slice(0,10);
      setBill({ billId:'mock-'+Date.now(), biller:{name_en:b.name_en, name_ar:b.name_ar, icon:b.icon, category:b.category}, reference:r, amount, dueDate });
      setBiller(b); setReference(r);
      setStep('confirm');
    }
    setLoading(false);
  };

  const payBill = async () => {
    if (!bill) return;
    setLoading(true); setError(null);
    if (apiOnline && token) {
      try {
        const r = await api.billPay(bill.billId, token);
        setBalance(r.wallet.balance);
        setTx(arr => [{type:'out', name:r.biller, amt:-bill.amount, time:'tx_just'}, ...arr]);
        api.recentBills(token).then(d => setRecent(d.recent || [])).catch(()=>{});
        setStep('paid');
      } catch (e) { setError(e.message); setLoading(false); return; }
    } else {
      if (balance < bill.amount) { setError(t.pay_insufficient); setLoading(false); return; }
      setBalance(b => +(b-bill.amount).toFixed(2));
      setTx(arr => [{type:'out', name:bill.biller.name_en, amt:-bill.amount, time:'tx_just'}, ...arr]);
      setStep('paid');
    }
    setLoading(false);
  };

  const isAlreadySaved = bill && saved.some(s => s.billerId === (bill.billerId || biller?.id) && s.reference === bill.reference);
  const saveCurrentBiller = async () => {
    if (!apiOnline || !token || !bill || !nickname.trim()) return;
    try {
      await api.saveBiller(bill.billerId || biller.id, nickname.trim(), bill.reference, token);
      const d = await api.savedBillers(token);
      setSaved(d.saved || []);
      setSavedOk(true);
      setTimeout(()=>setSavedOk(false), 2500);
      setNickname('');
    } catch (e) { setError(e.message); }
  };

  const removeSaved = async (id) => {
    if (!apiOnline || !token) return;
    await api.deleteSavedBiller(id, token).catch(()=>{});
    setSaved(s => s.filter(x => x.id !== id));
  };

  const payFromSaved = (s) => {
    const b = billers.find(x => x.id === s.billerId) || { id:s.billerId, name_en:s.name_en, name_ar:s.name_ar, icon:s.icon, category:s.category, ref_label_en:s.ref_label_en, ref_label_ar:s.ref_label_ar };
    lookupBill(b, s.reference);
  };

  const payFromRecent = (r) => {
    const b = billers.find(x => x.id === r.billerId) || { id:r.billerId, name_en:r.name_en, name_ar:r.name_ar, icon:r.icon, category:r.category };
    lookupBill(b, r.reference);
  };

  const exit = () => setScreen('app');
  const Header = ({title, onBack}) => (
    <div className="flex items-center gap-3 p-5 pt-12 border-b border-slate-100 bg-white">
      <button onClick={onBack} className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-600">{rtl?'→':'←'}</button>
      <h2 className="text-lg font-bold text-slate-800">{title}</h2>
    </div>
  );

  const due = bill ? dueMeta(bill.dueDate, t) : null;

  return (
    <div className="h-full bg-slate-50 overflow-y-auto hide-scroll">
      <div key={step} className="fade-in">
        {step === 'categories' && (
          <div>
            <Header title={t.pay_title} onBack={exit}/>
            <div className="p-5 space-y-5">

              {saved.length > 0 && (
                <section>
                  <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">{t.pay_saved}</p>
                  <div className="flex gap-2 overflow-x-auto hide-scroll -mx-1 px-1 pb-1">
                    {saved.map(s => (
                      <div key={s.id} className="shrink-0 w-36 bg-white rounded-2xl p-3 shadow-sm relative group">
                        <button onClick={()=>payFromSaved(s)} className="w-full text-start">
                          <div className="text-2xl mb-1.5">{s.icon}</div>
                          <p className="text-xs font-bold text-slate-800 truncate">{s.nickname}</p>
                          <p className="text-[10px] text-slate-500 truncate" dir="ltr">{s.reference}</p>
                        </button>
                        <button onClick={(e)=>{ e.stopPropagation(); removeSaved(s.id); }}
                          className="absolute top-1.5 end-1.5 w-5 h-5 rounded-full bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-600 text-[10px] flex items-center justify-center">✕</button>
                      </div>
                    ))}
                  </div>
                </section>
              )}

              {recent.length > 0 && (
                <section>
                  <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">{t.pay_recent}</p>
                  <div className="bg-white rounded-2xl shadow-sm divide-y divide-slate-100">
                    {recent.slice(0,3).map(r => (
                      <button key={r.id} onClick={()=>payFromRecent(r)} className="w-full flex items-center gap-3 p-3 hover:bg-slate-50 text-start">
                        <div className="text-xl">{r.icon}</div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-semibold text-slate-800 truncate">{r[nameKey]}</p>
                          <p className="text-xs text-slate-500 truncate" dir="ltr">{r.reference}</p>
                        </div>
                        <span className="text-xs font-bold text-teal-600" dir="ltr">{r.amount.toFixed(2)} {t.jod}</span>
                      </button>
                    ))}
                  </div>
                </section>
              )}

              <section>
                <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">{t.pay_all_cats}</p>
                <div className="grid grid-cols-2 gap-3">
                  {CATS.map(c => (
                    <button key={c.id} onClick={()=>{ setCategory(c.id); setSearch(''); setStep('billers'); }}
                      className="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition text-start">
                      <div className="text-3xl mb-2">{c.icon}</div>
                      <p className="text-sm font-bold text-slate-800">{t['cat_'+c.id]}</p>
                    </button>
                  ))}
                </div>
              </section>

              <div className="bg-teal-50 rounded-2xl p-4 flex items-center justify-between">
                <span className="text-xs font-semibold text-teal-700">{t.pay_balance}</span>
                <span className="text-lg font-black text-teal-700" dir="ltr">{balance.toFixed(2)} {t.jod}</span>
              </div>
            </div>
          </div>
        )}

        {step === 'billers' && (
          <div>
            <Header title={t['cat_'+category]} onBack={()=>setStep('categories')}/>
            <div className="p-5">
              <div className="relative mb-4">
                <span className="absolute start-3 top-1/2 -translate-y-1/2 text-slate-400">🔎</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.pay_search}
                  className="w-full bg-white border border-slate-200 rounded-2xl py-3 ps-10 pe-4 text-sm outline-none focus:border-teal-500"/>
              </div>
              <div className="space-y-2">
                {catBillers.map(b => (
                  <button key={b.id} onClick={()=>{ setBiller(b); setReference(''); setStep('reference'); }}
                    className="w-full bg-white rounded-2xl p-4 shadow-sm flex items-center gap-3 hover:shadow-md transition">
                    <div className="text-2xl">{b.icon}</div>
                    <span className="flex-1 text-start text-sm font-bold text-slate-800">{b[nameKey]}</span>
                    <span className="text-slate-300 text-lg">{rtl?'‹':'›'}</span>
                  </button>
                ))}
                {!catBillers.length && <p className="text-center text-slate-400 text-sm py-8">—</p>}
              </div>
            </div>
          </div>
        )}

        {step === 'reference' && biller && (
          <div>
            <Header title={biller[nameKey]} onBack={()=>setStep('billers')}/>
            <div className="p-5">
              <div className="flex items-center gap-3 mb-6">
                <div className="w-12 h-12 rounded-2xl bg-teal-50 flex items-center justify-center text-2xl">{biller.icon}</div>
                <div>
                  <p className="text-xs text-slate-500">{t['cat_'+biller.category]}</p>
                  <p className="text-sm font-bold text-slate-800">{biller[nameKey]}</p>
                </div>
              </div>
              <label className="text-xs font-semibold text-slate-500 mb-2 block">{biller[labelKey]}</label>
              <input ref={refInput} value={reference} onChange={e=>setReference(e.target.value)}
                onKeyDown={e=>{ if (e.key==='Enter') lookupBill(); }}
                inputMode="numeric" placeholder={t.pay_ref_placeholder}
                className="w-full bg-white border-2 border-slate-200 rounded-2xl p-4 text-base font-semibold outline-none focus:border-teal-500 tracking-wider" dir="ltr"/>
              {error && <p className="mt-3 text-xs text-red-600">{error}</p>}
              {loading && (
                <div className="mt-4 bg-white rounded-2xl p-4 shadow-sm animate-pulse">
                  <div className="h-3 bg-slate-200 rounded w-1/2 mb-2"></div>
                  <div className="h-6 bg-slate-200 rounded w-2/3"></div>
                </div>
              )}
              <button onClick={()=>lookupBill()} disabled={!reference.trim() || loading}
                className="w-full mt-6 bg-teal-600 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-4 rounded-2xl">
                {loading ? t.pay_fetching : t.pay_fetch}
              </button>
            </div>
          </div>
        )}

        {step === 'confirm' && bill && (
          <div>
            <Header title={t.pay_title} onBack={()=>setStep('reference')}/>
            <div className="p-5">
              <div className="bg-white rounded-3xl shadow-sm p-6 text-center">
                <div className="text-5xl mb-3">{bill.biller.icon}</div>
                <p className="text-sm font-bold text-slate-800">{bill.biller[nameKey] || bill.biller.name_en}</p>
                <p className="text-xs text-slate-500 mt-1" dir="ltr">{bill.reference}</p>
                <div className="my-6 py-6 border-y border-slate-100">
                  <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">{t.pay_bill_amount}</p>
                  <p className="text-4xl font-black text-slate-800" dir="ltr">{bill.amount.toFixed(2)} <span className="text-xl text-slate-500">{t.jod}</span></p>
                  <div className="flex items-center justify-center gap-2 mt-3 flex-wrap">
                    <span className="text-xs text-slate-500">{t.pay_due}: <span dir="ltr">{bill.dueDate}</span></span>
                    {due && <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${due.bg}`}>{due.label}</span>}
                  </div>
                </div>
                <div className="flex items-center justify-between text-xs">
                  <span className="text-slate-500">{t.pay_balance}</span>
                  <span className="font-bold text-teal-700" dir="ltr">{balance.toFixed(2)} {t.jod}</span>
                </div>
              </div>
              {error && <p className="mt-3 text-xs text-red-600 text-center">{error}</p>}
              <button onClick={payBill} disabled={loading || balance < bill.amount}
                className="w-full mt-6 bg-teal-600 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-4 rounded-2xl">
                {loading ? '...' : balance < bill.amount ? t.pay_insufficient : t.pay_pay_now}
              </button>
            </div>
          </div>
        )}

        {step === 'paid' && bill && (
          <div className="h-full flex flex-col items-center p-6 pt-10 bg-gradient-to-b from-teal-50 to-white">
            <div className="w-20 h-20 rounded-full bg-teal-600 flex items-center justify-center pop mb-3 shadow-2xl">
              {I.check('w-10 h-10 text-white')}
            </div>
            <h2 className="text-lg font-bold text-slate-800 mb-3">{t.pay_success}</h2>
            <div className="bg-white rounded-2xl shadow-sm p-4 w-full max-w-xs">
              <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 text-center">{t.pay_receipt}</p>
              <div className="flex justify-between text-sm py-0.5"><span className="text-slate-500">{bill.biller[nameKey] || bill.biller.name_en}</span><span className="font-bold text-slate-800" dir="ltr">{bill.amount.toFixed(2)} {t.jod}</span></div>
              <div className="flex justify-between text-sm py-0.5"><span className="text-slate-500">{biller?.[labelKey] || ''}</span><span className="text-slate-700 truncate ms-2" dir="ltr">{bill.reference}</span></div>
              <div className="flex justify-between text-sm py-0.5 pt-2 border-t border-slate-100 mt-1"><span className="text-slate-500">{t.pay_balance}</span><span className="font-bold text-teal-700" dir="ltr">{balance.toFixed(2)} {t.jod}</span></div>
            </div>

            {apiOnline && !isAlreadySaved && !savedOk && (
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 w-full max-w-xs mt-3">
                <p className="text-xs font-bold text-amber-800 mb-2">💾 {t.pay_save_q}</p>
                <input value={nickname} onChange={e=>setNickname(e.target.value)} placeholder={t.pay_nickname}
                  className="w-full border border-amber-200 rounded-lg p-2 text-xs bg-white outline-none focus:border-amber-500"/>
                <button onClick={saveCurrentBiller} disabled={!nickname.trim()}
                  className="w-full mt-2 bg-amber-500 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-2 rounded-lg text-xs">
                  {t.pay_save_btn}
                </button>
              </div>
            )}
            {isAlreadySaved && <p className="text-xs text-emerald-600 font-semibold mt-3">✓ {t.pay_already_saved}</p>}
            {savedOk && <p className="text-xs text-emerald-600 font-semibold mt-3 pop">{t.pay_saved_ok}</p>}

            <div className="mt-4 space-y-2 w-full max-w-xs">
              <button onClick={()=>{ setStep('categories'); setBill(null); setBiller(null); setReference(''); setError(null); setNickname(''); }} className="w-full bg-teal-600 text-white font-bold py-3 rounded-2xl">{t.pay_new}</button>
              <button onClick={exit} className="w-full bg-slate-100 text-slate-700 font-semibold py-3 rounded-2xl">{t.pay_back_home}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- Merchant ----------
function MerchantFlow({t, rtl, mScreen, setMScreen, amount, setAmount, paid, setPaid, change, mCount, setMCount, mTotal, setMTotal, demoMode, setPendingChange, apiOnline, setQrId, setQrDataUrl, qrDataUrl}) {
  const onComplete = () => {
    setMCount(c => c+1);
    setMTotal(v => +(v+change).toFixed(2));
  };
  const onGenerate = async () => {
    if (apiOnline && setQrId) {
      try {
        const r = await api.merchantQr(amount, paid);
        setQrId(r.qrId);
        setQrDataUrl(r.qrDataUrl);
      } catch (e) { console.warn('merchant/qr failed', e.message); }
    }
    if (demoMode && setPendingChange) setPendingChange(change);
    setMScreen('qr');
  };
  return (
    <div className="w-full h-full bg-slate-50 relative overflow-hidden">
      {mScreen === 'amount' && (
        <div className="h-full flex flex-col p-6 pt-12 fade-in">
          <p className="text-xs text-slate-400 uppercase tracking-wider mb-1">{t.m_title}</p>
          <h2 className="text-xl font-bold text-slate-800 mb-6">{t.m_store} ☕</h2>

          {/* Today's summary */}
          <div className="bg-white rounded-2xl p-4 shadow-sm mb-5 flex items-center justify-between">
            <div>
              <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">{t.m_today}</p>
              <p className="text-xs text-slate-600"><span className="font-bold text-teal-700">{mCount}</span> {t.m_count} · <span className="font-bold text-teal-700" dir="ltr">{mTotal.toFixed(2)}</span> {t.jod} {t.m_total}</p>
            </div>
            <div className="w-10 h-10 rounded-xl bg-teal-50 text-teal-600 flex items-center justify-center">{I.qr('w-5 h-5')}</div>
          </div>

          <label className="text-xs font-semibold text-slate-500 mb-2">{t.m_amount}</label>
          <div className="bg-white rounded-2xl p-4 shadow-sm mb-4 flex items-center gap-2" dir="ltr">
            <input type="text" value={amount} onChange={e=>setAmount(e.target.value)}
              className="flex-1 text-3xl font-bold text-slate-800 outline-none bg-transparent min-w-0"/>
            <span className="text-slate-400 font-semibold text-sm">{t.jod}</span>
          </div>

          <label className="text-xs font-semibold text-slate-500 mb-2">{t.m_paid}</label>
          <div className="bg-white rounded-2xl p-4 shadow-sm mb-4 flex items-center gap-2" dir="ltr">
            <input type="text" value={paid} onChange={e=>setPaid(e.target.value)}
              className="flex-1 text-3xl font-bold text-slate-800 outline-none bg-transparent min-w-0"/>
            <span className="text-slate-400 font-semibold text-sm">{t.jod}</span>
          </div>

          <div className="bg-teal-50 border border-teal-200 rounded-2xl p-4 mb-6">
            <p className="text-xs font-semibold text-teal-700 mb-1">{t.m_change}</p>
            <p className="text-3xl font-black text-teal-700" dir="ltr">{change.toFixed(2)} <span className="text-lg">{t.jod}</span></p>
          </div>

          <div className="flex-1"></div>
          <button onClick={onGenerate} disabled={change<=0}
            className="w-full bg-teal-600 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-4 rounded-2xl shadow-lg">
            {t.m_generate}
          </button>
        </div>
      )}

      {mScreen === 'qr' && (
        <div className="h-full flex flex-col p-6 pt-10 fade-in items-center">
          <button onClick={()=>{ if (demoMode && setPendingChange) setPendingChange(null); if (setQrId) { setQrId(null); setQrDataUrl(null); } setMScreen('amount'); }} className="self-start text-slate-400 text-sm mb-4">{rtl?'→ رجوع':'← Back'}</button>
          <p className="text-xs text-slate-500 uppercase tracking-wider">{t.m_change}</p>
          <p className="text-4xl font-black text-teal-700 my-2" dir="ltr">{change.toFixed(2)} {t.jod}</p>
          <div className="relative mt-6">
            <div className="absolute inset-0 pulse-ring border-4 border-teal-400 rounded-3xl"></div>
            <div className="bg-white p-4 rounded-3xl shadow-xl border-2 border-slate-100">
              {qrDataUrl ? <img src={qrDataUrl} width={220} height={220} alt="QR"/> : <MockQR size={220}/>}
            </div>
          </div>
          <p className="mt-6 text-sm text-slate-500">{t.m_waiting}</p>
          <div className="flex-1"></div>
          {!demoMode && (
            <button onClick={()=>{ onComplete(); setMScreen('done'); }} className="w-full bg-slate-100 text-slate-700 font-semibold py-3 rounded-2xl text-sm">
              {t.m_simulate}
            </button>
          )}
        </div>
      )}

      {mScreen === 'done' && (
        <div className="h-full flex flex-col items-center justify-center p-8 bg-gradient-to-b from-teal-50 to-white fade-in">
          <div className="w-28 h-28 rounded-full bg-teal-600 flex items-center justify-center pop mb-6 shadow-2xl">
            {I.check('w-14 h-14 text-white')}
          </div>
          <h2 className="text-2xl font-bold text-slate-800 mb-2">{t.m_received}</h2>
          <div className="text-5xl font-black text-teal-600 my-4 pop" dir="ltr">{change.toFixed(2)} <span className="text-2xl">{t.jod}</span></div>
          <button onClick={()=>setMScreen('amount')} className="mt-10 bg-teal-600 text-white font-bold px-10 py-3 rounded-2xl">{t.m_new_tx}</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
